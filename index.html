<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Tierlist — Shikimori</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #3a3a4a;
    --accent: #c084fc;
    --tier-s: #ff6b6b;
    --tier-a: #ff9f43;
    --tier-b: #ffd32a;
    --tier-c: #7bed9f;
    --tier-d: #74b9ff;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }
  .page { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  header { margin-bottom: 2.5rem; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem; letter-spacing: 0.05em; line-height: 1; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }

  .import-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem; margin-bottom: 2rem;
  }
  .import-card h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 1rem; }

  .input-row { display: flex; gap: 10px; }
  input[type="text"] {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.95rem;
    padding: 0 1rem; height: 44px; outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-dim); }

  button {
    background: var(--accent); border: none; border-radius: var(--radius-sm);
    color: #0d0d0f; font-family: 'Nunito', sans-serif; font-size: 0.9rem;
    font-weight: 600; padding: 0 1.25rem; height: 44px; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  button.secondary {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  }
  button.secondary:hover { border-color: var(--border-hover); }

  .filters { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .filters label { font-size: 0.8rem; color: var(--text-muted); }
  select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.85rem;
    padding: 5px 10px; outline: none; cursor: pointer;
  }

  .progress-wrap { margin-top: 12px; display: none; }
  .progress-track { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.35s ease; }
  .progress-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }
  .error { font-size: 0.85rem; color: #ff6b6b; margin-top: 10px; display: none; }

  .pool-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .pool-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .pool-meta { font-size: 0.78rem; color: var(--text-dim); }
  .pool-search { margin-bottom: 10px; }
  .pool-search input { width: 100%; max-width: 300px; font-size: 0.85rem; height: 36px; }

  .pool-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; min-height: 100px; max-height: 300px; overflow-y: auto;
    display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start;
    margin-bottom: 2rem; transition: border-color 0.15s, background 0.15s;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .pool-wrap.drag-over { border-color: var(--accent); background: rgba(192,132,252,0.05); }

  .empty-hint {
    width: 100%; text-align: center; font-size: 0.85rem; color: var(--text-dim);
    padding: 1.5rem 0; pointer-events: none;
  }

  .tierlist-section { margin-bottom: 2rem; }
  .tierlist-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; }

  .tier-row {
    display: flex; align-items: stretch; border-radius: var(--radius);
    overflow: hidden; border: 1px solid var(--border); margin-bottom: 6px; min-height: 120px;
  }
  .tier-label {
    width: 60px; min-width: 60px; display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.05em; flex-shrink: 0;
  }
  .tier-S .tier-label { background: var(--tier-s); color: #3a0000; }
  .tier-A .tier-label { background: var(--tier-a); color: #3a1a00; }
  .tier-B .tier-label { background: var(--tier-b); color: #3a2a00; }
  .tier-C .tier-label { background: var(--tier-c); color: #003a10; }
  .tier-D .tier-label { background: var(--tier-d); color: #001e3a; }

  .tier-drop {
    flex: 1; display: flex; flex-wrap: wrap; align-items: flex-start; align-content: flex-start;
    gap: 8px; padding: 10px; background: var(--surface); min-height: 120px; transition: background 0.12s;
  }
  .tier-drop.drag-over { background: rgba(192,132,252,0.08); }
  .tier-drop .anime-card { width: 68px; }

  .anime-card {
    width: 82px; border-radius: var(--radius-sm); overflow: hidden;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: grab; user-select: none; position: relative; flex-shrink: 0;
    transition: transform 0.12s, border-color 0.12s;
  }
  .anime-card:hover { transform: translateY(-3px); border-color: var(--border-hover); }
  .anime-card.dragging { opacity: 0.3; transform: scale(0.92); }
  .anime-card:active { cursor: grabbing; }
  .anime-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: var(--surface); }
  .anime-card .no-poster {
    width: 100%; aspect-ratio: 2/3; display: flex; align-items: center; justify-content: center;
    background: var(--surface2); font-size: 10px; color: var(--text-muted);
    text-align: center; padding: 6px; line-height: 1.3;
  }
  .anime-card .card-info { padding: 5px 5px 7px; }
  .anime-card .card-title {
    font-size: 10px; font-weight: 600; color: var(--text); line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .anime-card .card-year { font-size: 9px; color: var(--text-muted); margin-top: 2px; }

  .score-badge {
    position: absolute; top: 4px; left: 4px;
    background: rgba(0,0,0,0.75); color: #fff;
    font-size: 10px; font-weight: 700; border-radius: 4px; padding: 1px 5px; line-height: 1.6;
  }
  .score-badge.high { color: #7bed9f; }
  .score-badge.mid  { color: #ffd32a; }
  .score-badge.low  { color: #ff6b6b; }

  .return-btn {
    position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,0,0,0.7); color: #fff; font-size: 11px;
    display: none; align-items: center; justify-content: center;
    cursor: pointer; border: none; padding: 0; min-height: unset;
    font-family: 'Nunito', sans-serif; transition: background 0.12s;
  }
  .anime-card:hover .return-btn { display: flex; }
  .return-btn:hover { background: rgba(192,132,252,0.85); opacity: 1; }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .actions-right { margin-left: auto; display: flex; gap: 10px; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 600px) {
    .logo { font-size: 2.4rem; }
    .input-row { flex-direction: column; }
    .actions-right { margin-left: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">ANIME<span>TIER</span></div>
    <div class="tagline">Shikimori · Drag & Drop · S/A/B/C/D</div>
  </header>

  <div class="import-card">
    <h2>Загрузить профиль</h2>
    <div class="input-row">
      <input type="text" id="profile-input" placeholder="shikimori.one/nickname или просто nickname" />
      <button id="load-btn" onclick="loadProfile()">&#9654; Загрузить</button>
    </div>
    <div class="filters" id="filters" style="display:none">
      <label>Оценка:</label>
      <select id="score-filter" onchange="applyFilter()">
        <option value="0">Все</option>
        <option value="7">7+</option>
        <option value="8">8+</option>
        <option value="9">9+</option>
      </select>
      <label>Тип:</label>
      <select id="kind-filter" onchange="applyFilter()">
        <option value="">Все</option>
        <option value="tv">TV</option>
        <option value="movie">Фильмы</option>
        <option value="ova">OVA / ONA</option>
      </select>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">Загружаем...</div>
    </div>
    <div class="error" id="error-msg"></div>
  </div>

  <div class="pool-header">
    <span class="pool-title">Пул аниме</span>
    <span class="pool-meta" id="pool-meta"></span>
  </div>
  <div class="pool-search" id="pool-search-wrap" style="display:none">
    <input type="text" id="pool-search" placeholder="Поиск по пулу..." oninput="applyFilter()" />
  </div>
  <div class="pool-wrap" id="pool" data-zone="pool">
    <div class="empty-hint">Загрузи профиль — аниме появятся здесь</div>
  </div>

  <div class="tierlist-section">
    <div class="tierlist-label">Тирлист</div>
    <div id="tierlist">
      <div class="tier-row tier-S">
        <div class="tier-label">S</div>
        <div class="tier-drop" data-zone="S"><div class="empty-hint">Перетащи сюда</div></div>
      </div>
      <div class="tier-row tier-A">
        <div class="tier-label">A</div>
        <div class="tier-drop" data-zone="A"><div class="empty-hint">Перетащи сюда</div></div>
      </div>
      <div class="tier-row tier-B">
        <div class="tier-label">B</div>
        <div class="tier-drop" data-zone="B"><div class="empty-hint">Перетащи сюда</div></div>
      </div>
      <div class="tier-row tier-C">
        <div class="tier-label">C</div>
        <div class="tier-drop" data-zone="C"><div class="empty-hint">Перетащи сюда</div></div>
      </div>
      <div class="tier-row tier-D">
        <div class="tier-label">D</div>
        <div class="tier-drop" data-zone="D"><div class="empty-hint">Перетащи сюда</div></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="secondary" onclick="resetTierlist()">&#8617; Сбросить тирлист</button>
    <div class="actions-right">
      <button onclick="exportImage()">&#11015; Сохранить как PNG</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const API_BASE = 'https://shikimori.one/api';
let allRates = [];
let draggedCard = null;

// Multi-proxy fallback — tries each proxy until one works
const PROXIES = [
  function(u) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
  function(u) { return 'https://corsproxy.io/?url=' + encodeURIComponent(u); },
  function(u) { return 'https://thingproxy.freeboard.io/fetch/' + u; }
];

async function apiFetch(path) {
  var url = API_BASE + path;
  var lastErr = null;
  for (var i = 0; i < PROXIES.length; i++) {
    try {
      var res = await fetch(PROXIES[i](url));
      if (res.status === 404) {
        throw new Error('Пользователь не найден. Проверь никнейм.');
      }
      if (res.ok) return res;
    } catch(e) {
      if (e.message.indexOf('не найден') !== -1) throw e;
      lastErr = e;
    }
  }
  throw lastErr || new Error('Не удаётся подключиться к Shikimori. Попробуй позже.');
}

function parseUsername(s) {
  s = s.trim();
  try {
    var u = new URL(s.startsWith('http') ? s : 'https://' + s);
    var parts = u.pathname.split('/').filter(Boolean);
    if (parts.length) return parts[parts.length - 1];
  } catch(e) {}
  return s.replace(/^@/, '');
}

function setProgress(pct, label) {
  var wrap = document.getElementById('progress-wrap');
  var fill = document.getElementById('progress-fill');
  var lbl  = document.getElementById('progress-label');
  if (pct <= 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  fill.style.width = pct + '%';
  if (label) lbl.textContent = label;
}

function setError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function loadProfile() {
  var raw = document.getElementById('profile-input').value;
  if (!raw.trim()) return;
  var username = parseUsername(raw);
  setError('');
  setProgress(5, 'Ищем профиль...');
  document.getElementById('load-btn').disabled = true;

  try {
    var userRes = await apiFetch('/users/' + encodeURIComponent(username));
    var user = await userRes.json();

    setProgress(20, 'Загружаем список ' + user.nickname + '...');

    var all = [], page = 1;
    while (true) {
      var r = await apiFetch('/users/' + user.id + '/anime_rates?status=completed&limit=100&page=' + page);
      if (!r.ok) break;
      var batch = await r.json();
      if (!batch.length) break;
      all = all.concat(batch);
      setProgress(Math.min(20 + page * 12, 88), 'Загружено ' + all.length + ' аниме...');
      if (batch.length < 100) break;
      page++;
      await sleep(400);
    }

    allRates = all;
    document.getElementById('filters').style.display = 'flex';
    document.getElementById('pool-search-wrap').style.display = 'block';
    applyFilter();
    setProgress(0);

  } catch(e) {
    setError(e.message || 'Ошибка загрузки. Попробуй позже.');
    setProgress(0);
  }
  document.getElementById('load-btn').disabled = false;
}

function applyFilter() {
  var minScore = parseInt(document.getElementById('score-filter').value) || 0;
  var kind = document.getElementById('kind-filter').value;
  var q = (document.getElementById('pool-search').value || '').toLowerCase();

  var filtered = allRates.filter(function(r) {
    if (minScore && (r.score || 0) < minScore) return false;
    if (kind && r.anime && r.anime.kind !== kind) return false;
    return true;
  });

  renderPool(filtered, q);
}

function renderPool(rates, q) {
  var pool = document.getElementById('pool');
  pool.innerHTML = '';

  var visible = q ? rates.filter(function(r) {
    var t = ((r.anime && r.anime.russian) || '' + ' ' + (r.anime && r.anime.name) || '').toLowerCase();
    return t.indexOf(q) !== -1;
  }) : rates;

  if (!visible.length) {
    pool.innerHTML = '<div class="empty-hint">Ничего не найдено</div>';
    document.getElementById('pool-meta').textContent = '';
    return;
  }

  visible.forEach(function(r) {
    if (document.querySelector('.tier-drop [data-rate-id="' + r.id + '"]')) return;
    pool.appendChild(makeCard(r));
  });

  var n = pool.querySelectorAll('.anime-card').length;
  document.getElementById('pool-meta').textContent = n ? n + ' тайтлов' : '';
  syncEmptyHints();
}

function makeCard(rate) {
  var anime = rate.anime || {};
  var div = document.createElement('div');
  div.className = 'anime-card';
  div.draggable = true;
  div.dataset.rateId = rate.id;

  var title = anime.russian || anime.name || '—';
  var year  = anime.aired_on ? anime.aired_on.slice(0,4) : '';

  var posterHTML;
  if (anime.image && anime.image.preview) {
    posterHTML = '<img src="https://api.allorigins.win/raw?url=' + encodeURIComponent('https://shikimori.one' + anime.image.preview) + '" alt="" crossorigin="anonymous" loading="lazy">';
  } else {
    posterHTML = '<div class="no-poster">' + title + '</div>';
  }

  var scoreCls = '';
  if (rate.score >= 9) scoreCls = 'high';
  else if (rate.score >= 7) scoreCls = 'mid';
  else if (rate.score > 0) scoreCls = 'low';
  var scoreHTML = rate.score > 0 ? '<div class="score-badge ' + scoreCls + '">' + rate.score + '</div>' : '';

  div.innerHTML = posterHTML + scoreHTML +
    '<div class="card-info"><div class="card-title">' + title + '</div><div class="card-year">' + year + '</div></div>' +
    '<button class="return-btn" title="Вернуть в пул">&#8617;</button>';

  div.querySelector('.return-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    var pool = document.getElementById('pool');
    var hint = pool.querySelector('.empty-hint');
    if (hint) hint.remove();
    div.style.width = '';
    pool.appendChild(div);
    syncEmptyHints();
    updatePoolMeta();
  });

  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragend',   onDragEnd);
  return div;
}

function onDragStart(e) {
  draggedCard = e.currentTarget;
  setTimeout(function() { if (draggedCard) draggedCard.classList.add('dragging'); }, 0);
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd() {
  if (draggedCard) draggedCard.classList.remove('dragging');
  draggedCard = null;
  document.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
  syncEmptyHints();
  updatePoolMeta();
}

function setupDrop(zone) {
  zone.addEventListener('dragover', function(e) {
    e.preventDefault();
    zone.classList.add('drag-over');
    if (!draggedCard) return;
    var after = getAfterEl(zone, e.clientX);
    if (after) zone.insertBefore(draggedCard, after);
    else zone.appendChild(draggedCard);
  });
  zone.addEventListener('dragleave', function(e) {
    if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
  });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    zone.classList.remove('drag-over');
    syncEmptyHints();
    updatePoolMeta();
  });
}

function getAfterEl(container, x) {
  var cards = Array.from(container.querySelectorAll('.anime-card:not(.dragging)'));
  var result = cards.reduce(function(cl, ch) {
    var box = ch.getBoundingClientRect();
    var off = x - box.left - box.width / 2;
    if (off < 0 && off > cl.offset) return { offset: off, el: ch };
    return cl;
  }, { offset: -Infinity, el: null });
  return result.el;
}

document.querySelectorAll('.tier-drop, #pool').forEach(setupDrop);

function syncEmptyHints() {
  document.querySelectorAll('.tier-drop').forEach(function(zone) {
    var hasCard = zone.querySelector('.anime-card');
    var hint    = zone.querySelector('.empty-hint');
    if (!hasCard && !hint) {
      var h = document.createElement('div');
      h.className = 'empty-hint'; h.textContent = 'Перетащи сюда';
      zone.appendChild(h);
    } else if (hasCard && hint) {
      hint.remove();
    }
  });
  var pool = document.getElementById('pool');
  var hasCard = pool.querySelector('.anime-card');
  var hint    = pool.querySelector('.empty-hint');
  if (!hasCard && !hint) {
    var h = document.createElement('div');
    h.className = 'empty-hint'; h.textContent = 'Все аниме разложены по рядам!';
    pool.appendChild(h);
  } else if (hasCard && hint) {
    hint.remove();
  }
}

function updatePoolMeta() {
  var n = document.getElementById('pool').querySelectorAll('.anime-card').length;
  document.getElementById('pool-meta').textContent = n ? n + ' тайтлов' : '';
}

function resetTierlist() {
  var pool = document.getElementById('pool');
  document.querySelectorAll('.tier-drop .anime-card').forEach(function(c) {
    c.style.width = '';
    pool.appendChild(c);
  });
  syncEmptyHints();
  updatePoolMeta();
}

async function exportImage() {
  var btn = document.querySelector('button[onclick="exportImage()"]');
  btn.disabled = true;
  btn.textContent = 'Генерируем...';
  try {
    var tierlist = document.getElementById('tierlist');
    var canvas = await html2canvas(tierlist, {
      backgroundColor: '#0d0d0f', scale: 2, useCORS: true, allowTaint: false, logging: false
    });
    var link = document.createElement('a');
    link.download = 'anime-tierlist.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Не удалось сохранить — сделай скриншот вручную');
  }
  btn.disabled = false;
  btn.textContent = 'Сохранить как PNG';
}

document.getElementById('profile-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadProfile();
});
</script>
