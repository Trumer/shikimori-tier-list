<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Tierlist — Shikimori</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #3a3a4a;
    --accent: #c084fc;
    --tier-s: #ff6b6b;
    --tier-a: #ff9f43;
    --tier-b: #ffd32a;
    --tier-c: #7bed9f;
    --tier-d: #74b9ff;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }
  .page { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  header { margin-bottom: 2.5rem; display: flex; align-items: flex-start; justify-content: space-between; }
  .header-left {}
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem; letter-spacing: 0.05em; line-height: 1; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }

  /* Language toggle */
  .lang-toggle {
    display: flex; gap: 4px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 4px; margin-top: 6px;
  }
  .lang-btn {
    background: transparent; border: none; color: var(--text-muted);
    font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 600;
    padding: 4px 10px; height: auto; min-height: unset; border-radius: 4px;
    cursor: pointer; transition: all 0.15s;
  }
  .lang-btn.active {
    background: var(--accent); color: #0d0d0f;
  }
  .lang-btn:hover:not(.active) { color: var(--text); }

  .import-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem; margin-bottom: 2rem;
  }
  .import-card h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 1rem; }

  .input-row { display: flex; gap: 10px; }
  input[type="text"] {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.95rem;
    padding: 0 1rem; height: 44px; outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-dim); }

  button {
    background: var(--accent); border: none; border-radius: var(--radius-sm);
    color: #0d0d0f; font-family: 'Nunito', sans-serif; font-size: 0.9rem;
    font-weight: 600; padding: 0 1.25rem; height: 44px; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  button.secondary {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  }
  button.secondary:hover { border-color: var(--border-hover); }

  .filters { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .filters label { font-size: 0.8rem; color: var(--text-muted); }
  select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.85rem;
    padding: 5px 10px; outline: none; cursor: pointer;
  }

  .progress-wrap { margin-top: 12px; display: none; }
  .progress-track { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.35s ease; }
  .progress-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }
  .error { font-size: 0.85rem; color: #ff6b6b; margin-top: 10px; display: none; }

  .pool-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .pool-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .pool-meta { font-size: 0.78rem; color: var(--text-dim); }
  .pool-search { margin-bottom: 10px; }
  .pool-search input { width: 100%; max-width: 300px; font-size: 0.85rem; height: 36px; }

  .pool-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; min-height: 100px; max-height: 340px; overflow-y: auto;
    display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start;
    margin-bottom: 2rem; transition: border-color 0.15s, background 0.15s;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .pool-wrap.drag-over { border-color: var(--accent); background: rgba(192,132,252,0.05); }

  .empty-hint {
    width: 100%; text-align: center; font-size: 0.85rem; color: var(--text-dim);
    padding: 1.5rem 0; pointer-events: none;
  }

  .tierlist-section { margin-bottom: 2rem; }
  .tierlist-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; }

  .tier-row {
    display: flex; align-items: stretch; border-radius: var(--radius);
    overflow: hidden; border: 1px solid var(--border); margin-bottom: 6px; min-height: 120px;
  }
  .tier-label {
    width: 60px; min-width: 60px; display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.05em; flex-shrink: 0;
  }
  .tier-S .tier-label { background: var(--tier-s); color: #3a0000; }
  .tier-A .tier-label { background: var(--tier-a); color: #3a1a00; }
  .tier-B .tier-label { background: var(--tier-b); color: #3a2a00; }
  .tier-C .tier-label { background: var(--tier-c); color: #003a10; }
  .tier-D .tier-label { background: var(--tier-d); color: #001e3a; }

  .tier-drop {
    flex: 1; display: flex; flex-wrap: wrap; align-items: flex-start; align-content: flex-start;
    gap: 8px; padding: 10px; background: var(--surface); min-height: 120px; transition: background 0.12s;
  }
  .tier-drop.drag-over { background: rgba(192,132,252,0.08); }
  .tier-drop .anime-card { width: 68px; }

  .anime-card {
    width: 82px; border-radius: var(--radius-sm); overflow: hidden;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: grab; user-select: none; position: relative; flex-shrink: 0;
    transition: transform 0.12s, border-color 0.12s;
    touch-action: none;
    -webkit-user-select: none;
  }
  .anime-card:hover { transform: translateY(-3px); border-color: var(--border-hover); }
  .anime-card.dragging { opacity: 0.3; transform: scale(0.92); }
  .anime-card:active { cursor: grabbing; }
  .anime-card { touch-action: none; }
  .anime-card.touch-dragging {
    opacity: 0.85;
    position: fixed;
    z-index: 1000;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transform: scale(1.05) rotate(2deg);
    transition: none;
  }
  .drop-highlight { border-color: var(--accent) !important; background: rgba(192,132,252,0.1) !important; }
  .anime-card img {
    width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block;
    background: var(--surface);
    /* fade-in when loaded */
    opacity: 0; transition: opacity 0.3s;
  }
  .anime-card img.loaded { opacity: 1; }
  .anime-card .no-poster {
    width: 100%; aspect-ratio: 2/3; display: flex; align-items: center; justify-content: center;
    background: var(--surface2); font-size: 10px; color: var(--text-muted);
    text-align: center; padding: 6px; line-height: 1.3;
  }
  .anime-card .card-info { padding: 5px 5px 7px; }
  .anime-card .card-title {
    font-size: 10px; font-weight: 600; color: var(--text); line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .anime-card .card-year { font-size: 9px; color: var(--text-muted); margin-top: 2px; }

  /* dropped badge */
  .dropped-x {
    position: absolute; bottom: 6px; right: 4px;
    width: 16px; height: 16px; border-radius: 50%;
    background: rgba(220,38,38,0.85);
    color: #fff; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    line-height: 1; pointer-events: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .score-badge {
    position: absolute; top: 4px; left: 4px;
    background: rgba(0,0,0,0.75); color: #fff;
    font-size: 10px; font-weight: 700; border-radius: 4px; padding: 1px 5px; line-height: 1.6;
  }
  .score-badge.high { color: #7bed9f; }
  .score-badge.mid  { color: #ffd32a; }
  .score-badge.low  { color: #ff6b6b; }

  .return-btn {
    position: absolute; top: 4px; right: 4px;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,0,0,0.7); color: #fff; font-size: 11px;
    display: none; align-items: center; justify-content: center;
    cursor: pointer; border: none; padding: 0; min-height: unset;
    font-family: 'Nunito', sans-serif; transition: background 0.12s;
  }
  .anime-card:hover .return-btn { display: flex; }
  .return-btn:hover { background: rgba(192,132,252,0.85); opacity: 1; }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .actions-right { margin-left: auto; display: flex; gap: 10px; }

  /* Touch drag clone */
  .touch-dragging {
    position: fixed !important;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.85;
    transform: scale(1.08) rotate(2deg);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: none !important;
  }
  /* Drop zone highlight on touch */
  .drop-highlight {
    border-color: var(--accent) !important;
    background: rgba(192,132,252,0.1) !important;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 600px) {
    .logo { font-size: 2.4rem; }
    .input-row { flex-direction: column; }
    .actions-right { margin-left: 0; }
    header { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="header-left">
      <div class="logo">ANIME<span>TIER</span></div>
      <div class="tagline" data-i18n="tagline">Shikimori · Drag & Drop · S/A/B/C/D</div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ru')">RU</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <div class="import-card">
    <h2 data-i18n="loadProfile">Загрузить профиль</h2>
    <div class="input-row">
      <input type="text" id="profile-input" data-i18n-placeholder="inputPlaceholder" placeholder="shikimori.one/nickname или просто nickname" />
      <button id="load-btn" onclick="loadProfile()">&#9654; <span data-i18n="loadBtn">Загрузить</span></button>
    </div>
    <div class="filters" id="filters" style="display:none">
      <label data-i18n="filterScore">Оценка:</label>
      <select id="score-filter" onchange="applyFilter()">
        <option value="0" data-i18n="filterAll">Все</option>
        <option value="7">7+</option>
        <option value="8">8+</option>
        <option value="9">9+</option>
      </select>
      <label data-i18n="filterType">Тип:</label>
      <select id="kind-filter" onchange="applyFilter()">
        <option value="" data-i18n="filterAll">Все</option>
        <option value="tv">TV</option>
        <option value="movie" data-i18n="filterMovies">Фильмы</option>
        <option value="ova">OVA / ONA</option>
      </select>
      <label data-i18n="filterStatus">Статус:</label>
      <select id="status-filter" onchange="applyFilter()">
        <option value="" data-i18n="filterAll">Все</option>
        <option value="completed" data-i18n="filterCompleted">Просмотрено</option>
        <option value="dropped" data-i18n="filterDropped">Брошено</option>
      </select>
    
      <label style="margin-left:6px"><input type="checkbox" id="score-toggle" checked onchange="applyFilter()" style="margin-right:4px;accent-color:var(--accent)"><span data-i18n="showScores"></span></label></div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label" data-i18n="loading">Загружаем...</div>
    </div>
    <div class="error" id="error-msg"></div>
  </div>

  <div class="pool-header">
    <span class="pool-title" data-i18n="poolTitle">Пул аниме</span>
    <span class="pool-meta" id="pool-meta"></span>
  </div>
  <div class="pool-search" id="pool-search-wrap" style="display:none">
    <input type="text" id="pool-search" data-i18n-placeholder="searchPlaceholder" placeholder="Поиск по пулу..." oninput="applyFilter()" />
  </div>
  <div class="pool-wrap" id="pool" data-zone="pool">
    <div class="empty-hint" data-i18n="poolHint">Загрузи профиль — аниме появятся здесь</div>
  </div>

  <div class="tierlist-section">
    <div class="tierlist-label" data-i18n="tierlistLabel">Тирлист</div>
    <div id="tierlist">
      <div class="tier-row tier-S">
        <div class="tier-label">S</div>
        <div class="tier-drop" data-zone="S"><div class="empty-hint" data-i18n="dropHint">Перетащи сюда</div></div>
      </div>
      <div class="tier-row tier-A">
        <div class="tier-label">A</div>
        <div class="tier-drop" data-zone="A"><div class="empty-hint" data-i18n="dropHint">Перетащи сюда</div></div>
      </div>
      <div class="tier-row tier-B">
        <div class="tier-label">B</div>
        <div class="tier-drop" data-zone="B"><div class="empty-hint" data-i18n="dropHint">Перетащи сюда</div></div>
      </div>
      <div class="tier-row tier-C">
        <div class="tier-label">C</div>
        <div class="tier-drop" data-zone="C"><div class="empty-hint" data-i18n="dropHint">Перетащи сюда</div></div>
      </div>
      <div class="tier-row tier-D">
        <div class="tier-label">D</div>
        <div class="tier-drop" data-zone="D"><div class="empty-hint" data-i18n="dropHint">Перетащи сюда</div></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="secondary" onclick="resetTierlist()">&#8617; <span data-i18n="resetBtn">Сбросить тирлист</span></button>
    <div class="actions-right">
      <button onclick="exportImage()">&#11015; <span data-i18n="exportBtn">Сохранить как PNG</span></button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ─── i18n ───────────────────────────────────────────────────────────────────
const STRINGS = {
  ru: {
    tagline: 'Shikimori · Drag & Drop · S/A/B/C/D',
    loadProfile: 'Загрузить профиль',
    inputPlaceholder: 'shikimori.one/nickname или просто nickname',
    loadBtn: 'Загрузить',
    filterScore: 'Оценка:',
    filterType: 'Тип:',
    filterStatus: 'Статус:',
    filterAll: 'Все',
    filterMovies: 'Фильмы',
    filterCompleted: 'Просмотрено',
    filterDropped: 'Брошено',
    loading: 'Загружаем...',
    poolTitle: 'Пул аниме',
    searchPlaceholder: 'Поиск по пулу...',
    poolHint: 'Загрузи профиль — аниме появятся здесь',
    tierlistLabel: 'Тирлист',
    dropHint: 'Перетащи сюда',
    resetBtn: 'Сбросить тирлист',
    exportBtn: 'Сохранить как PNG',
    allDone: 'Все аниме разложены по рядам!',
    nothingFound: 'Ничего не найдено',
    titles: 'тайтлов',
    searching: 'Ищем профиль...',
    loaded: 'Загружено',
    anime: 'аниме',
    generating: 'Генерируем...',
    droppedLabel: 'Брошено',
    errNotFound: 'Пользователь не найден. Проверь никнейм.',
    errConnect: 'Не удаётся подключиться к Shikimori. Попробуй позже.',
    showScores: 'Показывать оценки',
    returnTitle: 'Вернуть в пул',
  },
  en: {
    tagline: 'Shikimori · Drag & Drop · S/A/B/C/D',
    loadProfile: 'Load Profile',
    inputPlaceholder: 'shikimori.one/nickname or just nickname',
    loadBtn: 'Load',
    filterScore: 'Score:',
    filterType: 'Type:',
    filterStatus: 'Status:',
    filterAll: 'All',
    filterMovies: 'Movies',
    filterCompleted: 'Completed',
    filterDropped: 'Dropped',
    loading: 'Loading...',
    poolTitle: 'Anime Pool',
    searchPlaceholder: 'Search pool...',
    poolHint: 'Load a profile — anime will appear here',
    tierlistLabel: 'Tierlist',
    dropHint: 'Drop here',
    resetBtn: 'Reset Tierlist',
    exportBtn: 'Save as PNG',
    allDone: 'All anime placed in tiers!',
    nothingFound: 'Nothing found',
    titles: 'titles',
    searching: 'Searching profile...',
    loaded: 'Loaded',
    anime: 'anime',
    generating: 'Generating...',
    droppedLabel: 'Dropped',
    errNotFound: 'User not found. Check the nickname.',
    errConnect: 'Cannot connect to Shikimori. Try again later.',
    returnTitle: 'Return to pool',
  }
};

let currentLang = 'ru';
function t(key) { return STRINGS[currentLang][key] || STRINGS.ru[key] || key; }

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.textContent === lang.toUpperCase());
  });
  // Update static elements
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  // Re-render pool with new language
  applyFilter();
  syncEmptyHints();
}

// ─── Core ────────────────────────────────────────────────────────────────────
const API_BASE = 'https://shikimori.one/api';
let allRates = [];
let draggedCard = null;

// Proxies — only for API calls, NOT for images
const PROXIES = [
  function(u) { return 'https://corsproxy.io/?url=' + encodeURIComponent(u); },
  function(u) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
  function(u) { return 'https://thingproxy.freeboard.io/fetch/' + u; },
  function(u) { return 'https://proxy.cors.sh/' + u; },
  function(u) { return 'https://cors-anywhere.herokuapp.com/' + u; }
];

async function fetchWithTimeout(url, ms) {
  var ctrl = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, ms);
  try {
    var res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    return res;
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

// Race all proxies — first valid response wins
async function apiFetch(path) {
  var url = API_BASE + path;

  var controllers = [];
  var promises = PROXIES.map(function(proxy, i) {
    var ctrl = new AbortController();
    controllers.push(ctrl);
    return fetch(proxy(url), { signal: ctrl.signal })
      .then(function(res) {
        if (res.status === 404) return Promise.reject(new Error('__404__'));
        if (!res.ok) return Promise.reject(new Error('bad_status_' + res.status));
        // Cancel all other requests
        controllers.forEach(function(c, j) { if (j !== i) try { c.abort(); } catch(e){} });
        currentProxy = i;
        return res;
      });
  });

  // Use allSettled-style race: resolve on first success, reject only if all fail
  return new Promise(function(resolve, reject) {
    var failed = 0;
    var done = false;
    promises.forEach(function(p) {
      p.then(function(res) {
        if (!done) { done = true; resolve(res); }
      }).catch(function(e) {
        if (e.message === '__404__') {
          if (!done) { done = true; reject(new Error(t('errNotFound'))); }
          return;
        }
        failed++;
        if (failed === PROXIES.length && !done) {
          done = true;
          reject(new Error(t('errConnect')));
        }
      });
    });
    // Global timeout 15s
    setTimeout(function() {
      if (!done) {
        done = true;
        controllers.forEach(function(c) { try { c.abort(); } catch(e){} });
        reject(new Error(t('errConnect')));
      }
    }, 15000);
  });
}

function parseUsername(s) {
  s = s.trim();
  try {
    var u = new URL(s.startsWith('http') ? s : 'https://' + s);
    var parts = u.pathname.split('/').filter(Boolean);
    if (parts.length) return parts[parts.length - 1];
  } catch(e) {}
  return s.replace(/^@/, '');
}

function setProgress(pct, label) {
  var wrap = document.getElementById('progress-wrap');
  var fill = document.getElementById('progress-fill');
  var lbl  = document.getElementById('progress-label');
  if (pct === -1) { return; } // keep current state
  if (pct <= 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  fill.style.width = pct + '%';
  if (label) lbl.textContent = label;
}

function setError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function loadProfile() {
  var raw = document.getElementById('profile-input').value;
  if (!raw.trim()) return;
  var username = parseUsername(raw);
  setError('');
  setProgress(5, t('searching'));
  document.getElementById('load-btn').disabled = true;

  try {
    // Step 1: get user id — try direct first, then search
    var user = null;
    try {
      var userRes = await apiFetch('/users/' + encodeURIComponent(username));
      if (userRes.ok) user = await userRes.json();
    } catch(e) {}
    if (!user || user.id === undefined) {
      // fallback: search by nickname
      var searchRes = await apiFetch('/users?search=' + encodeURIComponent(username) + '&limit=5');
      var searchArr = await searchRes.json();
      if (!searchArr || !searchArr.length) throw new Error(t('errNotFound'));
      // pick exact match first, else first result
      user = searchArr.find(function(u) {
        return u.nickname.toLowerCase() === username.toLowerCase();
      }) || searchArr[0];
    }
    if (!user || !user.id) throw new Error(t('errNotFound'));
    var proxyNames = ['corsproxy.io', 'allorigins', 'thingproxy'];
    setProgress(30, t('loaded') + ' ' + user.nickname + ' (via ' + (proxyNames[currentProxy] || 'proxy') + ')...');

    // Step 2: fetch completed + dropped in ONE request each (limit=5000)
    var [completedRes, droppedRes] = await Promise.all([
      apiFetch('/users/' + user.id + '/anime_rates?status=completed&limit=5000&page=1'),
      apiFetch('/users/' + user.id + '/anime_rates?status=dropped&limit=5000&page=1')
    ]);

    setProgress(80, t('loaded') + '...');

    var completed = completedRes.ok ? (await completedRes.json()).map(function(r) { r._status = 'completed'; return r; }) : [];
    var dropped   = droppedRes.ok  ? (await droppedRes.json()).map(function(r)  { r._status = 'dropped';   return r; }) : [];

    var combined = completed.concat(dropped);

    // Deduplicate by anime.id
    var seen = {};
    var deduped = [];
    combined.forEach(function(r) {
      var aid = r.anime && r.anime.id;
      if (!aid) { deduped.push(r); return; }
      if (!seen[aid]) { seen[aid] = r; deduped.push(r); }
      else if ((r.score || 0) > (seen[aid].score || 0)) {
        var idx = deduped.indexOf(seen[aid]);
        if (idx !== -1) deduped[idx] = r;
        seen[aid] = r;
      }
    });

    allRates = deduped;
    document.getElementById('filters').style.display = 'flex';
    document.getElementById('pool-search-wrap').style.display = 'block';
    applyFilter();
    setProgress(0);

  } catch(e) {
    setError(e.message || t('errConnect'));
    setProgress(0);
  }
  document.getElementById('load-btn').disabled = false;
}

function applyFilter() {
  var minScore = parseInt(document.getElementById('score-filter').value) || 0;
  var kind = document.getElementById('kind-filter').value;
  var status = document.getElementById('status-filter').value;
  var q = (document.getElementById('pool-search').value || '').toLowerCase();

  var filtered = allRates.filter(function(r) {
    if (minScore && (r.score || 0) < minScore) return false;
    if (kind && r.anime && r.anime.kind !== kind) return false;
    if (status && r._status !== status) return false;
    return true;
  });

  var showScores = document.getElementById('score-toggle') ? document.getElementById('score-toggle').checked : true;
  renderPool(filtered, q, showScores);
}

function renderPool(rates, q, showScores) { if (showScores === undefined) showScores = true;
  var pool = document.getElementById('pool');
  pool.innerHTML = '';

  var visible = q ? rates.filter(function(r) {
    var ru = (r.anime && r.anime.russian) || '';
    var en = (r.anime && r.anime.name) || '';
    return (ru + ' ' + en).toLowerCase().indexOf(q) !== -1;
  }) : rates;

  if (!visible.length) {
    pool.innerHTML = '<div class="empty-hint">' + t('nothingFound') + '</div>';
    document.getElementById('pool-meta').textContent = '';
    return;
  }

  visible.forEach(function(r) {
    r._showScore = showScores;
    if (document.querySelector('.tier-drop [data-rate-id="' + r.id + '"]')) return;
    pool.appendChild(makeCard(r));
  });

  var n = pool.querySelectorAll('.anime-card').length;
  document.getElementById('pool-meta').textContent = n ? n + ' ' + t('titles') : '';
  syncEmptyHints();
}

function makeCard(rate) {
  var anime = rate.anime || {};
  var div = document.createElement('div');
  div.className = 'anime-card';
  div.draggable = true;
  div.dataset.rateId = rate.id;

  // Title: prefer Russian if lang=ru, otherwise English
  var title = currentLang === 'ru'
    ? (anime.russian || anime.name || '—')
    : (anime.name || anime.russian || '—');
  var year  = anime.aired_on ? anime.aired_on.slice(0,4) : '';

  var posterHTML;
  if (anime.image && anime.image.preview) {
    // Direct URL — much faster than allorigins proxy for images
    var imgSrc = 'https://images.weserv.nl/?url=' + encodeURIComponent('https://shikimori.one' + anime.image.preview) + '&w=185&output=webp';
    posterHTML = '<img src="' + imgSrc + '" alt="" loading="lazy" decoding="async" referrerpolicy="no-referrer">';
  } else {
    posterHTML = '<div class="no-poster">' + title + '</div>';
  }

  var scoreCls = '';
  if (rate.score >= 9) scoreCls = 'high';
  else if (rate.score >= 7) scoreCls = 'mid';
  else if (rate.score > 0) scoreCls = 'low';
  var scoreHTML = (rate.score > 0 && rate._showScore !== false) ? '<div class="score-badge ' + scoreCls + '">' + rate.score + '</div>' : '';

  var droppedBadge = rate._status === 'dropped'
    ? '<div class="dropped-x">✕</div>' : '';

  div.innerHTML = posterHTML + scoreHTML + droppedBadge +
    '<div class="card-info"><div class="card-title">' + title + '</div><div class="card-year">' + year + '</div></div>' +
    '<button class="return-btn" title="' + t('returnTitle') + '">&#8617;</button>';

  // Fade-in on image load
  var img = div.querySelector('img');
  if (img) {
    img.addEventListener('load', function() { img.classList.add('loaded'); });
    img.addEventListener('error', function() {
      // If direct load fails, fall back to proxy
      if (!img.dataset.proxied) {
        img.dataset.proxied = '1';
        // try direct URL (works on https hosting)
        img.removeAttribute('crossorigin'); img.src = 'https://shikimori.one' + anime.image.preview;
      } else if (!img.dataset.proxied2) {
        img.dataset.proxied2 = '1';
        // last resort: corsproxy for image
        img.src = 'https://corsproxy.io/?url=' + encodeURIComponent('https://shikimori.one' + anime.image.preview);
      } else {
        img.replaceWith(Object.assign(document.createElement('div'), {
          className: 'no-poster', textContent: title
        }));
      }
    });
  }

  div.querySelector('.return-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    var pool = document.getElementById('pool');
    var hint = pool.querySelector('.empty-hint');
    if (hint) hint.remove();
    div.style.width = '';
    pool.appendChild(div);
    syncEmptyHints();
    updatePoolMeta();
  });

  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragend',   onDragEnd);
  addTouchDrag(div);
  return div;
}

// ── Mouse drag & drop ────────────────────────────────────────────────────────
function onDragStart(e) {
  draggedCard = e.currentTarget;
  setTimeout(function() { if (draggedCard) draggedCard.classList.add('dragging'); }, 0);
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd() {
  if (draggedCard) draggedCard.classList.remove('dragging');
  draggedCard = null;
  document.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
  syncEmptyHints();
  updatePoolMeta();
}

function setupDrop(zone) {
  zone.addEventListener('dragover', function(e) {
    e.preventDefault();
    zone.classList.add('drag-over');
    if (!draggedCard) return;
    var after = getAfterEl(zone, e.clientX);
    if (after) zone.insertBefore(draggedCard, after);
    else zone.appendChild(draggedCard);
  });
  zone.addEventListener('dragleave', function(e) {
    if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
  });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    zone.classList.remove('drag-over');
    syncEmptyHints();
    updatePoolMeta();
  });
}

function getAfterEl(container, x) {
  var cards = Array.from(container.querySelectorAll('.anime-card:not(.dragging):not(.touch-dragging)'));
  var result = cards.reduce(function(cl, ch) {
    var box = ch.getBoundingClientRect();
    var off = x - box.left - box.width / 2;
    if (off < 0 && off > cl.offset) return { offset: off, el: ch };
    return cl;
  }, { offset: -Infinity, el: null });
  return result.el;
}

document.querySelectorAll('.tier-drop, #pool').forEach(setupDrop);

// ── Touch drag & drop ─────────────────────────────────────────────────────────
var touchCard = null;
var touchClone = null;
var touchOriginZone = null;
var touchOffX = 0, touchOffY = 0;
var lastHighlighted = null;

function getDropZoneAt(x, y) {
  var zones = document.querySelectorAll('.tier-drop, #pool');
  for (var i = 0; i < zones.length; i++) {
    var r = zones[i].getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return zones[i];
  }
  return null;
}

function onTouchStart(e) {
  var card = e.currentTarget;
  if (e.touches.length !== 1) return;
  var touch = e.touches[0];
  var rect = card.getBoundingClientRect();
  touchOffX = touch.clientX - rect.left;
  touchOffY = touch.clientY - rect.top;
  touchCard = card;
  touchOriginZone = card.parentElement;

  // Create floating clone
  touchClone = card.cloneNode(true);
  touchClone.classList.add('touch-dragging');
  touchClone.style.width = rect.width + 'px';
  touchClone.style.left = (touch.clientX - touchOffX) + 'px';
  touchClone.style.top  = (touch.clientY - touchOffY) + 'px';
  document.body.style.userSelect = 'none';
  document.body.appendChild(touchClone);

  card.style.opacity = '0.3';
  e.preventDefault();
}

function onTouchMove(e) {
  if (!touchCard || !touchClone) return;
  e.preventDefault();
  var touch = e.touches[0];
  touchClone.style.left = (touch.clientX - touchOffX) + 'px';
  touchClone.style.top  = (touch.clientY - touchOffY) + 'px';

  var zone = getDropZoneAt(touch.clientX, touch.clientY);
  if (lastHighlighted && lastHighlighted !== zone) {
    lastHighlighted.classList.remove('drop-highlight');
  }
  if (zone) {
    zone.classList.add('drop-highlight');
    lastHighlighted = zone;
  }
}

function onTouchEnd(e) {
  if (!touchCard || !touchClone) return;
  var touch = e.changedTouches[0];
  var zone = getDropZoneAt(touch.clientX, touch.clientY);

  if (lastHighlighted) lastHighlighted.classList.remove('drop-highlight');

  if (zone) {
    var after = getAfterEl(zone, touch.clientX);
    var hint = zone.querySelector('.empty-hint');
    if (hint) hint.remove();
    if (after) zone.insertBefore(touchCard, after);
    else zone.appendChild(touchCard);
  }

  touchCard.style.opacity = '';
  touchClone.remove();
  touchClone = null;
  touchCard = null;
  touchOriginZone = null;
  lastHighlighted = null;
  document.body.style.userSelect = '';
  syncEmptyHints();
  updatePoolMeta();
}

function addTouchDrag(card) {
  card.addEventListener('touchstart', onTouchStart, { passive: false });
  card.addEventListener('touchmove',  onTouchMove,  { passive: false });
  card.addEventListener('touchend',   onTouchEnd,   { passive: false });
}

function syncEmptyHints() {
  document.querySelectorAll('.tier-drop').forEach(function(zone) {
    var hasCard = zone.querySelector('.anime-card');
    var hint    = zone.querySelector('.empty-hint');
    if (!hasCard && !hint) {
      var h = document.createElement('div');
      h.className = 'empty-hint'; h.textContent = t('dropHint');
      zone.appendChild(h);
    } else if (hasCard && hint) {
      hint.remove();
    }
  });
  var pool = document.getElementById('pool');
  var hasCard = pool.querySelector('.anime-card');
  var hint    = pool.querySelector('.empty-hint');
  if (!hasCard && !hint) {
    var h = document.createElement('div');
    h.className = 'empty-hint'; h.textContent = t('allDone');
    pool.appendChild(h);
  } else if (hasCard && hint) {
    hint.remove();
  }
}

function updatePoolMeta() {
  var n = document.getElementById('pool').querySelectorAll('.anime-card').length;
  document.getElementById('pool-meta').textContent = n ? n + ' ' + t('titles') : '';
}

function resetTierlist() {
  var pool = document.getElementById('pool');
  document.querySelectorAll('.tier-drop .anime-card').forEach(function(c) {
    c.style.width = '';
    pool.appendChild(c);
  });
  syncEmptyHints();
  updatePoolMeta();
}

async function exportImage() {
  var btn = document.querySelector('button[onclick="exportImage()"]');
  btn.disabled = true;
  btn.querySelector('[data-i18n]').textContent = t('generating');
  try {
    var tierlist = document.getElementById('tierlist');
    var canvas = await html2canvas(tierlist, {
      backgroundColor: '#0d0d0f', scale: 2, useCORS: true, allowTaint: false, logging: false
    });
    var link = document.createElement('a');
    link.download = 'anime-tierlist.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Не удалось сохранить — сделай скриншот вручную');
  }
  btn.disabled = false;
  btn.querySelector('[data-i18n]').textContent = t('exportBtn');
}

document.getElementById('profile-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadProfile();
});
</script>
